<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Country Explorer - Discover Nations Worldwide</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🌍 Country Explorer</h1>
        <p class="subtitle">
          Discover information about countries around the world
        </p>
      </header>

      <main>
        <section class="search-section">
          <h2>Search for a Country</h2>
          <div class="search-box">
            <input
              type="text"
              id="countryInput"
              placeholder="Enter country name (e.g., Japan, France, Brazil)"
              aria-label="Country name"
            />
            <button id="searchBtn" class="btn-primary">Search</button>
          </div>
          <div class="example-tags">
            <span class="example-label">Try:</span>
            <button class="example-btn" data-country="Japan">Japan</button>
            <button class="example-btn" data-country="France">France</button>
            <button class="example-btn" data-country="Brazil">Brazil</button>
            <button class="example-btn" data-country="Canada">Canada</button>
          </div>
        </section>

        <section class="results-section" id="resultsSection">
          <!-- Results will be dynamically inserted here -->
          <div class="welcome-message">
            <p>👆 Enter a country name above to see its information</p>
          </div>
        </section>
      </main>

      <footer>
        <p>
          Data provided by
          <a href="https://restcountries.com/" target="_blank" rel="noopener"
            >REST Countries API</a
          >
        </p>
      </footer>
    </div>

    <!-- Loading indicator template (hidden by default) -->
    <template id="loadingTemplate">
      <div class="loading">
        <div class="spinner"></div>
        <p>Fetching country information...</p>
      </div>
    </template>

    <script src="js/app.js"></script>
  </body>
</html>
