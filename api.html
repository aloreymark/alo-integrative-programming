<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌍 Globetrotter - Country Information Explorer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🌍 Globetrotter</h1>
        <p class="tagline">Discover the world, one country at a time</p>
      </header>

      <main>
        <!-- Search Section -->
        <section class="search-section" aria-label="Country search">
          <div class="search-container">
            <label for="countryInput" class="visually-hidden"
              >Enter country name</label
            >
            <input
              type="text"
              id="countryInput"
              placeholder="e.g., Japan, France, Brazil"
              class="search-input"
            />
            <button id="searchBtn" class="search-btn">🔍 Search</button>
          </div>

          <!-- Quick search suggestions -->
          <div class="suggestions">
            <span class="suggestion-label">Popular:</span>
            <button class="suggestion-btn" data-country="Japan">Japan</button>
            <button class="suggestion-btn" data-country="France">France</button>
            <button class="suggestion-btn" data-country="Italy">Italy</button>
            <button class="suggestion-btn" data-country="Brazil">Brazil</button>
            <button class="suggestion-btn" data-country="Canada">Canada</button>
          </div>
        </section>

        <!-- Loading Indicator (hidden by default) -->
        <div id="loadingIndicator" class="loading hidden">
          <div class="spinner"></div>
          <p>Fetching country data...</p>
        </div>

        <!-- Results Section -->
        <section
          id="resultsSection"
          class="results-section"
          aria-label="Country information"
        >
          <div class="welcome-message">
            <p>👆 Enter a country name above to explore</p>
            <p class="welcome-sub">Try clicking one of the popular buttons!</p>
          </div>
        </section>
      </main>

      <footer>
        <p>
          Data provided by
          <a href="https://restcountries.com/" target="_blank" rel="noopener"
            >REST Countries API</a
          >
        </p>
        <p class="footer-note">
          API Integration Activity - Exploring APIs in Web Applications
        </p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
